  <script type="importmap">

<body>
  <div id="desktop-mode-warning" class="hidden-overlay" style="display: none; position: fixed; inset: 0; background-color: rgba(15, 23, 42, 0.95); z-index: 9999; justify-content: center; align-items: center; padding: 24px;">
    <div class="warning-content" style="background-color: #ffffff; padding: 32px 24px; border-radius: 24px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);">
      <!-- App Logo SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 72px; height: 72px; margin: 0 auto 20px; color: #4f46e5; background: #eef2ff; padding: 16px; border-radius: 20px;">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>

      <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 12px; color: #111827; font-family: 'Inter', sans-serif; letter-spacing: -0.025em;">App Experience Paused</h2>
      <p style="margin-bottom: 24px; color: #4b5563; font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.5;">It looks like you have <strong>"Desktop site"</strong> enabled in your browser. To enjoy MINDFLOW natively, please follow these steps:</p>

      <!-- Structured Step-by-Step Instructions -->
      <div style="text-align: left; margin-bottom: 32px; font-family: 'Inter', sans-serif; font-size: 14px; color: #374151; display: flex; flex-direction: column; gap: 16px;">

        <div style="display: flex; align-items: flex-start; gap: 12px;">
          <div style="background: #4f46e5; color: white; width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 12px; margin-top: 2px;">1</div>
          <div>Open your regular <strong>Chrome</strong> app.</div>
        </div>

        <div style="display: flex; align-items: flex-start; gap: 12px;">
          <div style="background: #4f46e5; color: white; width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 12px; margin-top: 2px;">2</div>
          <div>Tap the three-dot menu (<span style="writing-mode: vertical-rl; text-orientation: mixed; display: inline-block; font-weight: bold; letter-spacing: -2px; transform: translateY(4px); margin: 0 2px;">...</span>) in the top right.</div>
        </div>

        <div style="display: flex; align-items: flex-start; gap: 12px;">
          <div style="background: #4f46e5; color: white; width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 12px; margin-top: 2px;">3</div>
          <div style="width: 100%;">
            <div style="margin-bottom: 8px;">Uncheck <strong>Desktop site</strong>.</div>
            <!-- Visual Checkbox Mock -->
            <div style="display: flex; align-items: center; justify-content: space-between; background: #f3f4f6; padding: 10px 14px; border-radius: 8px; border: 1px solid #e5e7eb;">
              <span style="font-size: 14px; color: #111827;">Desktop site</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              </svg>
            </div>
          </div>
        </div>

        <div style="display: flex; align-items: flex-start; gap: 12px;">
          <div style="background: #4f46e5; color: white; width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 12px; margin-top: 2px;">4</div>
          <div>Return here and tap the button below.</div>
        </div>

      </div>

      <button onclick="window.location.reload()" style="width: 100%; background-color: #4f46e5; color: white; font-weight: 600; padding: 14px 16px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
          <path d="M3 3v5h5"></path>
        </svg>
        Reload App
      </button>
    </div>
  </div>

  <script>
    (function() {
      function checkDesktopMode() {
        var isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone || document.referrer.includes("android-app://");
        var isMobileWidthForce = window.innerWidth > window.screen.width;
        var hasTouch = navigator.maxTouchPoints > 0;

        var warningEl = document.getElementById("desktop-mode-warning");
        var rootEl = document.getElementById("root");

        // The user specifically requested this to apply only to the installed PWA
        if (isStandalone && isMobileWidthForce && hasTouch) {
          if (warningEl) warningEl.style.display = "flex";
          if (rootEl) rootEl.style.display = "none";
        } else {
          if (warningEl) warningEl.style.display = "none";
          if (rootEl) rootEl.style.display = "block";
        }
      }

      window.addEventListener("DOMContentLoaded", checkDesktopMode);
      window.addEventListener("resize", checkDesktopMode);

      // Run immediately in case DOM is already ready or script executes after DOMContentLoaded
      checkDesktopMode();
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
